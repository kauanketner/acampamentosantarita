services:
  postgres:
    image: postgres:16-alpine
    container_name: santarita-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: santarita
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: santarita
    ports:
      - '5432:5432'
    volumes:
      - santarita_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U santarita']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    container_name: santarita-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://santarita:senha@postgres:5432/santarita
    ports:
      - '3333:3333'
    volumes:
      - ./services/api:/app/services/api
      - ./packages:/app/packages
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: dev
    container_name: santarita-web
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
      target: dev
    container_name: santarita-admin
    restart: unless-stopped
    env_file: .env
    ports:
      - '3001:3001'
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - /app/node_modules

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: dev
    container_name: santarita-app
    restart: unless-stopped
    env_file: .env
    ports:
      - '3002:3002'
    volumes:
      - ./apps/app:/app/apps/app
      - ./packages:/app/packages
      - /app/node_modules

volumes:
  santarita_postgres:
